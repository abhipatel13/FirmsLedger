<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 46" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="20" y1="1" x2="20" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#243B58"/>
      <stop offset="100%" stop-color="#131F30"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M20,1 L38,8 L38,26 C38,35 30,40 20,44 C10,40 2,35 2,26 L2,8 Z"
        fill="url(#shieldGrad)"/>

  <!-- Top edge highlight -->
  <path d="M20,1 L38,8 L36,8.8 L20,2.6 L4,8.8 L2,8 Z"
        fill="#F5A623" opacity="0.35"/>

  <!-- Subtle ledger lines (top area) -->
  <rect x="11" y="12" width="18" height="2"   rx="1" fill="white" opacity="0.22"/>
  <rect x="11" y="16" width="13" height="2"   rx="1" fill="white" opacity="0.14"/>

  <!-- Gold checkmark -->
  <path d="M10,26 L17,33 L30,18"
        stroke="#F5A623" stroke-width="3.6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
